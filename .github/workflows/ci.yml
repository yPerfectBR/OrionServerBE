name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrionServerBE
    steps:
      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          path: OrionServerBE

      - name: Checkout orion-containers
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-containers
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: Plugins-Orion/orion:containers

      - name: Checkout orion-inventory
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-inventory
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: Plugins-Orion/orion:inventory

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # /config is gitignored locally; seed from first-run templates for CI build.
      - name: Seed config for build
        run: |
          mkdir -p config
          cp assets/first-run/server.json config/server.json
          cp assets/first-run/permissions.json config/permissions.json

      - name: Restore
        run: dotnet restore OrionServerBE.slnx

      - name: Build
        run: dotnet build OrionServerBE.slnx -c Release --no-restore

      - name: Test
        run: dotnet test OrionServerBE.slnx -c Release --no-build --verbosity normal
