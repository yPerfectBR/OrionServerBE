name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrionServerBE
    steps:
      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          path: OrionServerBE

      - name: Checkout orion-containers
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-containers
          ref: ${{ github.head_ref || github.ref_name }}
          path: Plugins-Orion/orion-containers

      - name: Checkout orion-inventory
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-inventory
          ref: ${{ github.head_ref || github.ref_name }}
          path: Plugins-Orion/orion-inventory

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # /config is gitignored locally; seed fixtures that match Logger.Tests expectations.
      - name: Seed config for build
        run: |
          mkdir -p config
          cp assets/ci/server.json config/server.json
          cp assets/ci/permissions.json config/permissions.json

      - name: Restore
        run: dotnet restore OrionServerBE.slnx

      - name: Build
        run: |
          set -euo pipefail
          for proj in \
            src/PluginContracts/PluginContracts.csproj \
            src/Orion.Api/Orion.Api.csproj \
            src/Orion.Gameplay.Api/Orion.Gameplay.Api.csproj \
            src/Protocol/Protocol.csproj \
            src/Orion/Orion.csproj \
            src/Server/Server.csproj \
            tests/Orion.Protocol.Tests/Orion.Protocol.Tests.csproj \
            tests/Orion.Logger.Tests/Orion.Logger.Tests.csproj \
            tests/Orion.World.Tests/Orion.World.Tests.csproj
          do
            dotnet build "$proj" -c Release --no-restore
          done

      - name: Test
        run: |
          set -euo pipefail
          for proj in \
            tests/Orion.Protocol.Tests/Orion.Protocol.Tests.csproj \
            tests/Orion.Logger.Tests/Orion.Logger.Tests.csproj \
            tests/Orion.World.Tests/Orion.World.Tests.csproj
          do
            dotnet test "$proj" -c Release --no-build --verbosity normal
          done
