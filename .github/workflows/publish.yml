name: Publish NuGet

# Merge into main → full test suite, then pack/push PluginContracts.
# Bump <Version> in PluginContracts.csproj before merging to release a new package.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (optional, e.g. 0.1.1)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrionServerBE
    steps:
      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          path: OrionServerBE

      - name: Checkout orion-containers
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-containers
          ref: main
          path: Plugins-Orion/orion:containers

      - name: Checkout orion-inventory
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-inventory
          ref: main
          path: Plugins-Orion/orion:inventory

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Seed config for build
        run: |
          mkdir -p config
          cp assets/first-run/server.json config/server.json
          cp assets/first-run/permissions.json config/permissions.json

      - name: Restore
        run: dotnet restore OrionServerBE.slnx

      - name: Build
        run: dotnet build OrionServerBE.slnx -c Release --no-restore

      - name: Test
        run: dotnet test OrionServerBE.slnx -c Release --no-build --verbosity normal

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep -oP '(?<=<Version>)[^<]+' src/PluginContracts/PluginContracts.csproj | head -1)
            echo "version=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack PluginContracts
        run: |
          mkdir -p artifacts/nuget
          dotnet pack src/PluginContracts/PluginContracts.csproj \
            -c Release \
            -o artifacts/nuget \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:PackageVersion=${{ steps.ver.outputs.version }}

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
