name: Publish NuGet

# Auto-publish SDK packages (PluginContracts, Orion.Api, Orion.Gameplay.Api, Orion.Protocol) on main.
# Version: optional override (must be > latest on nuget.org), else patch +0.0.1 on the highest SDK version.
on:
  push:
    branches: [main]
    paths:
      - "src/PluginContracts/**"
      - "src/Orion.Api/**"
      - "src/Orion.Gameplay.Api/**"
      - "src/Protocol/**"
      - "src/Binary/**"
      - "src/Config/**"
      - "src/Compression/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (must be greater than latest on nuget.org)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrionServerBE
    steps:
      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Seed config for build
        run: |
          mkdir -p config
          cp assets/ci/server.json config/server.json
          cp assets/ci/permissions.json config/permissions.json

      - name: Restore
        run: dotnet restore OrionServerBE.slnx

      - name: Build
        run: |
          set -euo pipefail
          for proj in \
            src/PluginContracts/PluginContracts.csproj \
            src/Orion.Api/Orion.Api.csproj \
            src/Orion.Gameplay.Api/Orion.Gameplay.Api.csproj \
            src/Protocol/Protocol.csproj \
            src/Orion/Orion.csproj \
            src/Server/Server.csproj \
            tests/Orion.Protocol.Tests/Orion.Protocol.Tests.csproj \
            tests/Orion.Logger.Tests/Orion.Logger.Tests.csproj \
            tests/Orion.World.Tests/Orion.World.Tests.csproj
          do
            dotnet build "$proj" -c Release --no-restore
          done

      - name: Test
        run: |
          set -euo pipefail
          for proj in \
            tests/Orion.Protocol.Tests/Orion.Protocol.Tests.csproj \
            tests/Orion.Logger.Tests/Orion.Logger.Tests.csproj \
            tests/Orion.World.Tests/Orion.World.Tests.csproj
          do
            dotnet test "$proj" -c Release --no-build --verbosity normal
          done

  publish:
    if: github.repository_owner == 'OrionBedrock'
    needs: build-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrionServerBE
    steps:
      - uses: actions/checkout@v4
        with:
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: ver
        working-directory: OrionServerBE
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version }}
          CSPROJ: src/PluginContracts/PluginContracts.csproj
        run: |
          set -euo pipefail
          SDK_PACKAGES="Orion.PluginContracts Orion.Api Orion.Gameplay.Api Orion.Protocol"

          version_gt() {
            [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | tail -1)" = "$1" ] && [ "$1" != "$2" ]
          }

          bump_patch() {
            local v="$1"
            local major minor patch
            IFS=. read -r major minor patch <<< "$v"
            patch=${patch%%-*}
            echo "${major}.${minor}.$((patch + 1))"
          }

          CURRENT=""
          for PKG in $SDK_PACKAGES; do
            ID_LOWER=$(echo "$PKG" | tr '[:upper:]' '[:lower:]')
            if INDEX=$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${ID_LOWER}/index.json" 2>/dev/null); then
              V=$(echo "$INDEX" | jq -r '.versions[-1] // empty')
              if [ -n "$V" ] && { [ -z "$CURRENT" ] || version_gt "$V" "$CURRENT"; }; then
                CURRENT="$V"
              fi
            fi
          done
          echo "Latest SDK version on nuget.org: ${CURRENT:-<none>}"

          if [ -n "${VERSION_OVERRIDE}" ]; then
            if [ -n "$CURRENT" ] && ! version_gt "$VERSION_OVERRIDE" "$CURRENT"; then
              echo "::error::Override '${VERSION_OVERRIDE}' must be greater than latest '${CURRENT}'"
              exit 1
            fi
            VER="$VERSION_OVERRIDE"
            echo "Using override version: $VER"
          elif [ -z "$CURRENT" ]; then
            VER=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ" | head -1)
            echo "No nuget.org SDK version; using csproj: $VER"
          else
            VER=$(bump_patch "$CURRENT")
            echo "Auto-bump patch: $CURRENT -> $VER"
          fi

          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $VER"

      - name: Pack SDK packages
        working-directory: OrionServerBE
        run: |
          mkdir -p artifacts/nuget
          VER="${{ steps.ver.outputs.version }}"
          for proj in \
            src/PluginContracts/PluginContracts.csproj \
            src/Orion.Api/Orion.Api.csproj \
            src/Orion.Gameplay.Api/Orion.Gameplay.Api.csproj \
            src/Protocol/Protocol.csproj
          do
            dotnet pack "$proj" \
              -c Release \
              -o artifacts/nuget \
              -p:Version="$VER" \
              -p:PackageVersion="$VER"
          done
          ls -la artifacts/nuget/

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        working-directory: OrionServerBE
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
